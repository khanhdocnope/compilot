<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rút Gọn URL - Rút Gọn Liên Kết Của Bạn</title>
    <link rel="stylesheet" href="style.css" />
    <script>
      // Configure API base URL for different deployment scenarios
      // For Render: update this to your API domain before deploying frontend
      // Example: window.API_BASE = "https://url-shortener-api.onrender.com/api";
      // Leave commented to use relative path (same domain as frontend)
      // window.API_BASE = "https://your-api-domain.onrender.com/api";
    </script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🔗 Rút Gọn URL</h1>
        <p>Tạo các liên kết ngắn gọn, dễ chia sẻ trong vài giây</p>
      </header>

      <main>
        <section class="section shorten-section">
          <h2>Rút Gọn Liên Kết</h2>
          <form id="shortenForm" class="form">
            <div class="form-group">
              <label for="urlInput">Nhập URL dài của bạn</label>
              <input
                type="url"
                id="urlInput"
                placeholder="https://example.com/duong/dan/rat/dai"
                required
              />
            </div>

            <div class="advanced-options">
              <button type="button" class="toggle-btn" id="advancedToggle">
                ⚙️ Tùy Chọn Nâng Cao
              </button>
              <div id="advancedContent" class="advanced-content" hidden>
                <div class="form-group">
                  <label for="customAlias"
                    >Bí Danh Tùy Chỉnh (Không bắt buộc)</label
                  >
                  <input
                    type="text"
                    id="customAlias"
                    placeholder="lien-ket-tuy-chinh"
                  />
                  <small>Chỉ sử dụng chữ cái, số và dấu gạch ngang</small>
                </div>

                <div class="form-group">
                  <label for="expiration">Hạn Sử Dụng Liên Kết</label>
                  <select id="expiration">
                    <option value="0">Không Bao Giờ Hết Hạn</option>
                    <option value="1">1 Giờ</option>
                    <option value="24">1 Ngày</option>
                    <option value="168">1 Tuần</option>
                    <option value="720">30 Ngày</option>
                  </select>
                </div>
              </div>
            </div>

            <button type="submit" class="btn btn-primary">Rút Gọn URL</button>
          </form>
        </section>

        <section id="resultSection" class="section result-section" hidden>
          <h2>URL Đã Rút Gọn Của Bạn</h2>
          <div class="result-box">
            <div class="result-item">
              <label>URL Ngắn:</label>
              <div class="result-display">
                <input
                  type="text"
                  id="shortUrlDisplay"
                  readonly
                  class="result-input"
                />
                <button id="copyBtn" class="btn btn-copy">📋 Sao Chép</button>
              </div>
            </div>

            <div class="result-item">
              <label>URL Gốc:</label>
              <div class="result-display">
                <input
                  type="text"
                  id="originalUrlDisplay"
                  readonly
                  class="result-input"
                />
              </div>
            </div>

            <div class="result-stats">
              <div class="stat">
                <span class="stat-label">Đã tạo:</span>
                <span class="stat-value" id="createdTime">-</span>
              </div>
              <div class="stat">
                <span class="stat-label">Lượt nhấp:</span>
                <span class="stat-value" id="clickCount">0</span>
              </div>
            </div>

            <div class="qr-section">
              <h3>Mã QR</h3>
              <div class="qr-container">
                <img id="qrCodeImage" src="" alt="Mã QR" class="qr-image" />
              </div>
              <button id="downloadQrBtn" class="btn btn-download">
                ⬇️ Tải Xuống QR
              </button>
            </div>
          </div>
          <button id="newLinkBtn" class="btn btn-secondary">
            Tạo Liên Kết Khác
          </button>
        </section>

        <section class="section links-history">
          <h2>Các Liên Kết Gần Đây</h2>
          <button id="refreshLinksBtn" class="btn btn-small">🔄 Làm Mới</button>
          <div id="linksList" class="links-list">
            <p class="empty-state">
              Chưa có liên kết nào được tạo. Hãy tạo URL rút gọn đầu tiên của
              bạn ở trên!
            </p>
          </div>
        </section>
      </main>

      <div id="errorToast" class="toast toast-error" hidden></div>
      <div id="successToast" class="toast toast-success" hidden></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
